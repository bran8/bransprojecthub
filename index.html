<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brandon's Project Hub</title>
  <meta name="description" content="Brandon's personal collection of tools and projects." />

  <!--
    Google Fonts:
      Syne       — bold, geometric display font for the hero title (coder-premium feel)
      DM Sans    — clean, highly legible UI font for body copy and cards
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- 
       AMBIENT BACKGROUND ORBS
       Decorative gradient blobs placed in fixed position behind all content.
       Pure CSS/HTML — no JS needed. Enhance depth without distracting.
  = -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb--cyan"></div>
    <div class="orb orb--violet"></div>
    <div class="orb orb--teal"></div>
  </div>

  <!-- 
       HERO / HEADER
       Contains the site title and subtitle pulled from JSON (site.title /
       site.subtitle). JS will also inject the subtitle so both are dynamic.
       The static text here is a no-JS fallback.
  = -->
  <header class="hero" role="banner">
    <div class="hero__inner">
      <h1 class="hero__title" id="site-title">Brandon's Project Hub</h1>
      <p  class="hero__subtitle" id="site-subtitle">Tools for me, and you!</p>
    </div>
    <!-- Decorative scanline overlay — pure aesthetic, hidden from a11y tree -->
    <div class="hero__scanlines" aria-hidden="true"></div>
  </header>

  <!-- 
       PROJECTS GRID
       Cards are injected here by app.js after the JSON loads.
       The loading state and error state are also rendered into this section.
  = -->
  <main class="projects-section" id="projects-section" role="main">
    <div class="projects-grid" id="projects-grid">
      <!-- Cards injected by app.js -->
    </div>
  </main>

  <!-- 
       FOOTER
       Static signature. Kept intentionally minimal per spec.
  = -->
  <footer class="site-footer" role="contentinfo">
    <p class="site-footer__text">
      Built by <span class="site-footer__name">Brandon</span>
      &mdash; one tool at a time.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
